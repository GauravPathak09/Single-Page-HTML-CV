<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Changelog-card">
        <header class="header">
            <h1>Changelog</h1>
            <p> Here's everything we have shipped recently</p>

        </header>
        <div class="timeline">
            <div class="timeline-item">
                <div class="date">3 September 2025</div>
                <div class="dot"></div>
                <div class="content">Anouncing Projects on Frontent Roadmap</div>
            </div>
            <div class="timeline-item">
                <div class="date">3 October2025</div>
                <div class="dot"></div>
                <div class="content"> Build your learning habits with learning streaks</div>
            </div>
            <div class="timeline-item">
                <div class="date">3 November 2025</div>
                <div class="dot"></div>
                <div class="content">Introducing new features for better user experience</div>
            </div>
            <div class="timeline-item">
                <div class="date">3 December 2025</div>
                <div class="dot"></div>
                <div class="content">Enhanced performance and bug fixes</div>
            </div>
        </div>
        <div class="footer">
            <button class="btn">Visit Complete Changelog</button>
        </div>
    </div>
</body>
</html>
